name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get

      - name: Add C++ Deprecation Silence Flag
        run: |
          $cmakeFile = "windows\CMakeLists.txt"
          $content = Get-Content $cmakeFile -Raw
          $flag = "`nadd_definitions(-D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS)"
          Add-Content -Path $cmakeFile -Value $flag
          Write-Host "✅ Added deprecation silence flag"
      
      - name: Build Windows
        run: flutter build windows --dart-define=RESTRO_NAME="Pathway Restro" --dart-define=RESTRO_LOCATION="Patan, Lalitpur"
      
      - name: Zip Release
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "PathwayRestro.zip"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PathwayRestro-Windows
          path: PathwayRestro.zip