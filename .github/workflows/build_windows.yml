name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      
      - name: Install Dependencies
        run: flutter pub get
      
      - name: Build Windows
        run: flutter build windows --dart-define=RESTRO_NAME="Pathway Restro" --dart-define=RESTRO_LOCATION="Patan, Lalitpur"
      
      - name: Zip Release
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "PathwayRestro.zip"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4        # Changed v3 → v4
        with:
          name: PathwayRestro-Windows
          path: PathwayRestro.zip