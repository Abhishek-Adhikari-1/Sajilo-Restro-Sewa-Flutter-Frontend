name: Build Windows App

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get

      - name: Add C++ Deprecation Silence Flag
        run: |
          $cmakeFile = "windows\CMakeLists.txt"
          $content = Get-Content $cmakeFile -Raw
          $flag = "`nadd_definitions(-D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS)"
          Add-Content -Path $cmakeFile -Value $flag
          Write-Host "✅ Added deprecation silence flag"
      
      - name: Build Windows
        run: flutter build windows --dart-define=RESTRO_NAME="Pathway Restro" --dart-define=RESTRO_LOCATION="Patan, Lalitpur"
      
      - name: Zip Release
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "PathwayRestro-Windows.zip"
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PathwayRestro-Windows
          path: PathwayRestro-Windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'  
          channel: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get
      
      - name: Build Android APK
        run: flutter build apk --dart-define=RESTRO_NAME="Pathway Restro" --dart-define=RESTRO_LOCATION="Patan, Lalitpur" --release
      
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PathwayRestro-Android
          path: build/app/outputs/flutter-apk/app-release.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: PathwayRestro-Windows
          path: ./artifacts

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: PathwayRestro-Android
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Pathway Restro ${{ github.ref_name }}"
          body: |
            ## 📦 Pathway Restro ${{ github.ref_name }}
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `PathwayRestro-Windows.zip` |
            | 🤖 Android | `app-release.apk` |
            
            ### Windows Installation
            1. Download & Extract `PathwayRestro-Windows.zip`
            2. Install [VC++ Redistributable](https://aka.ms/vs/17/release/vc_redist.x64.exe) if needed
            3. Run `sajilo_restro_sewa.exe`
            
            ### Android Installation
            1. Download `app-release.apk`
            2. Enable **Install Unknown Apps** in settings
            3. Install the APK
          files: |
            artifacts/PathwayRestro-Windows.zip
            artifacts/app-release.apk
          draft: false
          prerelease: false